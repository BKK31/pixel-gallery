# Localizely configuration file
# This file is used for synchronization between your GitHub repository and Localizely platform.
# For more info: https://localizely.com/docs/github-integration/

config_version: "1.0"
project_id: "PUT_YOUR_PROJECT_ID_HERE"
file_type: "flutter_arb"

# Optional: specify the branch to sync (defaults to main)
# branch: main

upload:
  files:
    # Your template/main translation file
    - file: "lib/l10n/app_en.arb"
      locale_code: "en"

download:
  files:
    # Localizely will automatically add more languages to this list as you translate them!
    - file: "lib/l10n/app_en.arb"
      locale_code: "en"
